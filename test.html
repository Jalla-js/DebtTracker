<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#016b83">
  <title>Monzo Debt Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a class="skip-link" href="#appContent">Skip to content</a>

  <div class="app-shell" id="appShell">
    <header class="topbar glass-card">
      <div class="topbar-row">
        <button class="icon-btn" id="backBtn" aria-label="Go back" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 19 8.5 12l7-7"/></svg>
        </button>
        <div class="brand-wrap">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" role="img" aria-label="Debt tracker logo">
              <rect x="5" y="6" width="38" height="36" rx="16" fill="currentColor" opacity=".12"></rect>
              <path d="M17 28c1.8 4 5 6 9 6 5.8 0 10-4.4 10-10.2 0-4.6-2.9-8.4-7.1-9.6" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
              <path d="M13 20c0-3.8 3-7 7-7h7" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
            </svg>
          </div>
          <div>
            <div class="eyebrow" id="routeEyebrow">Overview</div>
            <h1 class="page-title" id="routeTitle">Debt Tracker</h1>
          </div>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" id="themeToggle" aria-label="Toggle dark mode">
            <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79Z"/></svg>
            <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 0 24 24" aria-hidden="true"><path d="M12 4V2m0 20v-2m8-8h2M2 12h2m13.66 5.66 1.41 1.41M4.93 4.93l1.41 1.41m11.32-1.41-1.41 1.41M6.34 17.66l-1.41 1.41"/><circle cx="12" cy="12" r="4"/></svg>
          </button>
        </div>
      </div>

      <div class="hero-panel glass-inner" id="dashboardHero">
        <div>
          <div class="eyebrow">Total outstanding</div>
          <div class="headline-amount tabular-nums" id="grandTotal">£0.00</div>
          <p class="muted copy-tight" id="heroSubtext">Track people, grouped debts, and payments.</p>
        </div>
        <div class="hero-chips" id="heroChips"></div>
      </div>

      <div class="toolbar glass-inner">
        <label class="search-wrap" for="globalSearch">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
          <input id="globalSearch" type="search" placeholder="Search people, groups, notes" autocomplete="off">
        </label>
        <div class="toolbar-row">
          <label class="select-wrap" for="sortSelect">
            <span>Sort</span>
            <select id="sortSelect">
              <option value="largest">Largest owed</option>
              <option value="newest">Newest</option>
              <option value="alpha">Alphabetical</option>
            </select>
          </label>
          <button class="pill-btn" id="archiveQuickBtn" type="button">Archive</button>
        </div>
      </div>
    </header>

    <main class="main-content" id="appContent" tabindex="-1">
      <section id="viewRoot" class="view-root"></section>
    </main>

    <nav class="bottom-nav glass-card" aria-label="Primary">
      <button class="bottom-nav-item is-active" data-nav="#/dashboard">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 13h8V3H3zm10 8h8V11h-8zM3 21h8v-6H3zm10-10h8V3h-8z"/></svg>
        <span>Home</span>
      </button>
      <button class="bottom-nav-item" data-nav="#/archive">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2zm3-4h10l2 3H5zM10 12h4"/></svg>
        <span>Archive</span>
      </button>
      <button class="bottom-nav-item" data-nav="#/dashboard" id="addNavBtn">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        <span>Add</span>
      </button>
    </nav>

    <button class="fab" id="fabBtn" type="button" aria-label="Add debt">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <div class="sheet-backdrop" id="sheetBackdrop" hidden>
    <section class="sheet" id="sheet" aria-modal="true" role="dialog" aria-labelledby="sheetTitle">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <div>
          <div class="eyebrow" id="sheetEyebrow">Create</div>
          <h2 id="sheetTitle">Add debt</h2>
        </div>
        <button class="icon-btn" id="sheetCloseBtn" aria-label="Close modal">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18"/></svg>
        </button>
      </div>
      <form id="debtForm" class="sheet-form">
        <input type="hidden" id="modeInput" value="create">
        <input type="hidden" id="personIdInput">
        <input type="hidden" id="groupPersonIdInput">
        <input type="hidden" id="debtIdInput">
        <div class="field-grid">
          <label class="field">
            <span>Person</span>
            <input id="personNameInput" type="text" placeholder="Dad" maxlength="40" required>
          </label>
          <label class="field">
            <span>Avatar</span>
            <input id="avatarInput" type="text" placeholder="🧑 or DA" maxlength="4">
          </label>
        </div>
        <label class="field">
          <span>Group</span>
          <input id="groupInput" type="text" placeholder="Fuel" maxlength="30" required>
        </label>
        <div class="field-grid">
          <label class="field">
            <span>Amount (£)</span>
            <input id="amountInput" type="number" step="0.01" min="0.01" inputmode="decimal" required>
          </label>
          <label class="field">
            <span>Created</span>
            <input id="dateInput" type="date">
          </label>
        </div>
        <label class="field">
          <span>Notes</span>
          <textarea id="notesInput" placeholder="Optional note, details, or reminder"></textarea>
        </label>
        <div class="sheet-actions">
          <button type="button" class="ghost-btn" id="cancelSheetBtn">Cancel</button>
          <button type="submit" class="primary-btn">Save debt</button>
        </div>
      </form>
    </section>
  </div>

  <div class="sheet-backdrop" id="paymentBackdrop" hidden>
    <section class="sheet mini-sheet" id="paymentSheet" aria-modal="true" role="dialog" aria-labelledby="paymentTitle">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <div>
          <div class="eyebrow">Payment</div>
          <h2 id="paymentTitle">Add part payment</h2>
        </div>
        <button class="icon-btn" id="paymentCloseBtn" aria-label="Close payment modal">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18"/></svg>
        </button>
      </div>
      <form id="paymentForm" class="sheet-form">
        <input type="hidden" id="paymentDebtId">
        <label class="field">
          <span>Amount paid (£)</span>
          <input id="paymentAmountInput" type="number" step="0.01" min="0.01" inputmode="decimal" required>
        </label>
        <label class="field">
          <span>Date</span>
          <input id="paymentDateInput" type="date">
        </label>
        <div class="sheet-actions">
          <button type="button" class="ghost-btn" id="cancelPaymentBtn">Cancel</button>
          <button type="submit" class="primary-btn">Apply payment</button>
        </div>
      </form>
    </section>
  </div>

  <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>
  <div class="confirm-backdrop" id="confirmBackdrop" hidden>
    <section class="confirm-card glass-card" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
      <h2 id="confirmTitle">Confirm action</h2>
      <p id="confirmText" class="muted"></p>
      <div class="confirm-actions">
        <button class="ghost-btn" id="confirmCancelBtn" type="button">Cancel</button>
        <button class="danger-btn" id="confirmOkBtn" type="button">Continue</button>
      </div>
    </section>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
